<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Order</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background: radial-gradient(circle at top, #111 0%, #050505 100%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:380px;
  background:rgba(255,255,255,0.03);
  border:1px solid #222;
  border-radius:16px;
  padding:25px;
  box-shadow:0 0 30px rgba(255,0,60,0.1);
}

h2{
  margin-top:0;
  color:#ff003c;
}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #222;
  background:#111;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff003c,#ff4d6d);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.back{
  text-align:center;
  margin-top:15px;
  color:#aaa;
  cursor:pointer;
}

.back:hover{
  color:white;
}
</style>

</head>

<body>

<div class="box">

<h2>Create New Order</h2>

<select id="plan">
  <option value="Basic Plan">Basic Plan</option>
  <option value="Pro Plan">Pro Plan</option>
  <option value="Premium Plan">Premium Plan</option>
</select>

<button onclick="createOrder()">Place Order</button>

<div class="back" onclick="window.location.href='./dashboard.html'">
  ← Back to Dashboard
</div>

</div>

<script>
const user = localStorage.getItem("user"); // same key as dashboard

async function createOrder(){
  const plan = document.getElementById("plan").value;

  const res = await fetch("https://a-backend-ufh8.onrender.com/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: user, plan })
  });

  const data = await res.json();

  if(data.success){
    alert("Order created successfully!");
    window.location.href = "./dashboard.html"; // redirect to dashboard
  } else {
    alert("Failed to create order");
  }
}
</script>

</body>
</html>
