<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family: 'Orbitron', sans-serif;
  background: #050505;
  color: #fff;
  min-height: 100vh;
}

/* Topbar */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background: rgba(14, 13, 13, 0.3); /* semi-transparent for glass effect */
  backdrop-filter: blur(15px);   /* glass blur */
  -webkit-backdrop-filter: blur(15px);
  border-bottom:1px solid #330033;
  box-shadow: 0 0 20px rgba(255,0,60,0.4);
}
.topbar h2 {
  color:#ff003c;
  font-weight:700;
  font-size:28px;
  margin:0;
  text-shadow: 0 0 8px #ff003c;
}
.logout {
  background:#ff003c;
  border:none;
  padding:12px 24px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  text-shadow:0 0 3px #fff;
  box-shadow:0 0 15px #ff003c;
  transition:0.3s;
}
.logout:hover { transform: scale(1.05); box-shadow:0 0 25px #ff003c; }

/* Container */
.container { max-width:1000px; margin:50px auto; padding:0 20px; }

/* Card */
.card {
  background:#111;
  border-radius:16px;
  padding:20px 25px;
  margin-bottom:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #330033;
  box-shadow:0 0 20px rgba(255,0,60,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform:translateY(-5px); box-shadow:0 0 35px rgba(255,0,60,0.7); }

/* Card info */
.card-info { display:flex; flex-direction:column; }
.card-info .plan { font-size:18px; font-weight:700; color:#ff003c; text-shadow:0 0 5px #ff003c; }
.card-info .date { font-size:14px; color:#aaa; margin-top:5px; text-shadow:0 0 2px #444; }

/* Status badge */
.badge {
  padding:8px 18px;
  border-radius:16px;
  font-weight:700;
  text-transform:uppercase;
  font-size:14px;
  min-width:100px;
  text-align:center;
  box-shadow:0 0 10px #fff;
  transition:0.3s;
}
.badge.Pending { background:#ff003c; color:#fff; box-shadow:0 0 15px #ff003c; }
.badge.Processing { background:#ffd24d; color:#222; box-shadow:0 0 15px #ffd24d; }
.badge.Done { background:#4dff88; color:#222; box-shadow:0 0 15px #4dff88; }

/* Empty */
.empty { text-align:center; color:#777; font-style:italic; margin-top:60px; font-size:18px; text-shadow:0 0 3px #444; }

</style>
</head>
<body>

<div class="topbar">
<h2>Dashboard</h2>
 <div style="display:flex; gap:10px;">
    <button class="logout" onclick="goHome()">Home</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>
<section style="padding:20px; text-align:center; color:#ff003c; text-shadow:0 0 5px #ff003c;">
  <h2>Track Your Orders</h2>
  <p>All your website plans and orders will appear below. You can see their current status in real-time.</p>
</section>

<div class="container" id="orders"></div>
<section style="margin-top:60px; padding:20px; text-align:center;">

  <h2 style="color:#ff003c; text-shadow:0 0 8px #ff003c;">
    Leave a Review
  </h2>

  <p style="color:#aaa;">Tell us about your experience</p>

  <div style="max-width:600px; margin:20px auto; text-align:left;">

    <!-- STAR RATING -->
    <div id="stars" style="font-size:28px; cursor:pointer; color:#444;">
      ★ ★ ★ ★ ★
    </div>

    <input id="reviewText" placeholder="Write your review..."
      style="width:100%; padding:12px; margin-top:15px;
      background:#111; border:1px solid #330033;
      color:#fff; border-radius:10px;">

    <button onclick="submitReview()"
      style="margin-top:15px; width:100%;
      padding:12px; background:#ff003c;
      border:none; color:#fff; font-weight:bold;
      border-radius:10px; cursor:pointer;
      box-shadow:0 0 15px #ff003c;">
      Submit Review
    </button>

  </div>

  <!-- REVIEWS LIST -->
  <div id="reviews" style="max-width:800px; margin:40px auto;"></div>

</section>
<script>
  function goHome(){
  window.location.href="../index.html";
}
// Guard & logout
const user = localStorage.getItem("user");
if(!user) window.location.href="./auth.html";
function logout(){ localStorage.removeItem("user"); window.location.href="./auth.html"; }

// Load orders
async function loadOrders(){
  const res = await fetch(`https://a-backend-ufh8.onrender.com/orders/${user}`);
  const data = await res.json();
  const box = document.getElementById("orders");
  if(!data.length){ box.innerHTML=`<div class="empty">No orders yet.</div>`; return; }

  box.innerHTML = data.map(o=>`
    <div class="card">
      <div class="card-info">
        <div class="plan">${o.plan}</div>
        <div class="date">${o.date}</div>
      </div>
      <div class="badge ${o.status}">${o.status}</div>
    </div>
  `).join("");
}

loadOrders();
setInterval(loadOrders,10000);
</script>
  <script>
let rating = 5;

// STAR SELECT
const starsEl = document.getElementById("stars");
const stars = starsEl.innerHTML.split("★").filter(Boolean);

function renderStars(r){
  starsEl.innerHTML = "";

  for(let i=1;i<=5;i++){
    const span = document.createElement("span");
    span.innerHTML = "★";
    span.style.color = i <= r ? "#ff003c" : "#444";
    span.onclick = () => {
      rating = i;
      renderStars(rating);
    };
    starsEl.appendChild(span);
  }
}

renderStars(rating);

// SUBMIT REVIEW
async function submitReview(){
  const text = document.getElementById("reviewText").value;

  if(!text){
    alert("Write a review first");
    return;
  }

  try {
    const res = await fetch("https://a-backend-ufh8.onrender.com/reviews", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        user,
        text,
        rating
      })
    });

    const data = await res.json();

    if(data.success){
      alert("Review submitted!");
      document.getElementById("reviewText").value = "";
      loadReviews();
    } else {
      alert("Failed to submit review");
    }

  } catch(err){
    console.log(err);
    alert("Error sending review");
  }
}

// LOAD REVIEWS
async function loadReviews(){
  const res = await fetch("https://a-backend-ufh8.onrender.com/reviews");
  const data = await res.json();

  const box = document.getElementById("reviews");

  if(!data.length){
    box.innerHTML = "<p style='color:#777;'>No reviews yet</p>";
    return;
  }

  box.innerHTML = data.map(r => `
    <div class="review-card">
      <div class="review-stars">
        ${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}
      </div>
      <div class="review-text">${r.text}</div>
    </div>
  `).join("");
}

loadReviews();
</script>
</body>
</html>
